# --------------------------------------------- #
# Copy Files to Remote Server
# --------------------------------------------- #
- name: Copy files to remote server
  hosts: all
  become: true
  vars:
    dest_user: robert
    dest_group: robert
    home_dir: "/home/{{ dest_user }}"
    config_base: "/home/{{ dest_user }}/.config/zsh/oh-my-posh"

  tasks:

    # ----------------------------------------- #
    # 1. Create directory structure
    # ----------------------------------------- #
    - name: Create oh-my-posh config directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ dest_user }}"
        group: "{{ dest_group }}"
        mode: '0755'
      loop:
        - "{{ config_base }}"
        - "{{ config_base }}/themes"
        - "{{ config_base }}/plugins"

    # ----------------------------------------- #
    # 2. Copy files into directory structure
    # ----------------------------------------- #
    - name: Copy oh-my-posh config files
      copy:
        src: "files/{{ item.src }}"
        dest: "{{ home_dir }}/{{ item.dest }}"
        owner: "{{ dest_user }}"
        group: "{{ dest_group }}"
        mode: "{{ item.mode }}"
      loop:
        - { src: "fzf-tab.plugin.zsh",  dest: "fzf-tab.plugin.zsh",  mode: "0644" }
        - { src: "python.plugin.zsh",     dest: "python.plugin.zsh",     mode: "0644" }
        - { src: "virtualenv.plugin.zsh",     dest: "virtualenv.plugin.zsh",     mode: "0644" }
        - { src: "you-should-use.plugin.zsh",     dest: "you-should-use.plugin.zsh",     mode: "0644" }
        - { src: "zsh-autosuggestions.plugin.zsh",     dest: "zsh-autosuggestions.plugin.zsh",     mode: "0644" }
        - { src: "zsh-completions.plugin.zsh",     dest: "zsh-completions.plugin.zsh",     mode: "0644" }
        - { src: "zsh-syntax-highlighting.plugin.zsh",     dest: "zsh-syntax-highlighting.plugin.zsh",     mode: "0644" }

