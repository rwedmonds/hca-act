  - ip_address: 172.16.10.16
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: a-leaf2b
    description: a-leaf2b_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
service_routing_protocols_model: multi-agent
