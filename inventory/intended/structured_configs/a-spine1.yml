    interval: 1200
    min_rx: 1200
    multiplier: 3
router_bgp:
  as: '65100'
  router_id: 192.168.244.11
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    password: AQQvKeimxJu+uGQ/yYvv9w==
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    password: q+VNViP5i4rVjW1cxFv2wA==
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 172.16.0.49
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: a-leaf1a
    description: a-leaf1a_Ethernet1
  - ip_address: 172.16.0.53
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: a-leaf1b
    description: a-leaf1b_Ethernet1
  - ip_address: 172.16.0.57
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: a-leaf2a
    description: a-leaf2a_Ethernet1
  - ip_address: 172.16.0.61
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65102'
    metadata:
      peer: a-leaf2b
    description: a-leaf2b_Ethernet1
  - ip_address: 172.16.10.13
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: a-leaf1a
    description: a-leaf1a_Loopback0
  - ip_address: 172.16.10.14
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: a-leaf1b
    description: a-leaf1b_Loopback0
  - ip_address: 172.16.10.15
