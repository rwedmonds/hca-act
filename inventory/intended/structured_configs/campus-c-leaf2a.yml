hostname: campus-c-leaf2a
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:dc:01
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 172.16.30.35/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 172.16.31.35/32
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 192.168.0.55/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: vEOS-LAB
  dc_name: CAMPUS
  fabric_name: HCA
  cv_tags:
    device_tags:
    - name: MLAG
      value: odd
mlag_configuration:
  domain_id: campus-c-leaf2
  local_interface: Vlan4094
  peer_address: 10.255.255.69
  peer_address_heartbeat:
    peer_ip: 192.168.0.56
    vrf: MGMT
  dual_primary_detection_delay: 5
  peer_link: Port-Channel11
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel11
  description: MLAG_campus-c-leaf2b_Port-Channel11
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 2-4094
      groups:
      - MLAG
- name: Port-Channel5
  description: L2_campus-c-leaf2c_Port-Channel1
  shutdown: false
  mlag: 5
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 10,20,30,40
- name: Port-Channel6
  description: L2_campus-c-leaf2d_Port-Channel1
  shutdown: false
  mlag: 6
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 10,20,30,40
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 172.16.30.0/24 eq 32
  - sequence: 20
    action: permit 172.16.31.0/24 eq 32
- name: PL-SVI-VRF-DEFAULT
  sequence_numbers:
  - sequence: 10
    action: permit 10.30.20.0/24
  - sequence: 20
    action: permit 10.30.30.0/24
  - sequence: 30
    action: permit 10.30.10.0/24
  - sequence: 40
    action: permit 10.30.40.0/24
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
  - sequence: 30
    type: permit
    match:
    - ip address prefix-list PL-SVI-VRF-DEFAULT
- name: RM-BGP-UNDERLAY-PEERS-OUT
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-SVI-VRF-DEFAULT
  - sequence: 20
    type: permit
- name: RM-EVPN-EXPORT-VRF-DEFAULT
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-SVI-VRF-DEFAULT
router_bfd:
  multihop:
    interval: 1200
    min_rx: 1200
    multiplier: 3
router_bgp:
  as: '65302'
  router_id: 172.16.30.35
  distance:
    external_routes: 20
    internal_routes: 200
    local_routes: 200
  graceful_restart:
    enabled: true
  maximum_paths:
    paths: 4
    ecmp: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65302'
    description: campus-c-leaf2b
    next_hop_self: true
    password: vnEaG8gMeQf3d3cN6PktXQ==
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    password: AQQvKeimxJu+uGQ/yYvv9w==
    send_community: all
    maximum_routes: 256000
    route_map_out: RM-BGP-UNDERLAY-PEERS-OUT
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    password: q+VNViP5i4rVjW1cxFv2wA==
    send_community: all
    maximum_routes: 0
  - name: WAN
    remote_as: '65534'
    description: WAN Routers
    bfd: true
    send_community: all
    maximum_routes: 12000
  neighbors:
  - ip_address: 10.255.254.69
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: campus-c-leaf2b
    description: campus-c-leaf2b_Vlan4093
  - ip_address: 172.16.0.136
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: campus-c-spine1
    description: campus-c-spine1_Ethernet7
  - ip_address: 172.16.0.138
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: campus-c-spine2
    description: campus-c-spine2_Ethernet7
  - ip_address: 192.168.224.31
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: campus-c-spine1
    description: campus-c-spine1_Loopback0
  - ip_address: 192.168.224.32
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65300'
    metadata:
      peer: campus-c-spine2
    description: campus-c-spine2_Loopback0
  - ip_address: 169.254.30.1
    peer_group: WAN
    description: WAN Router
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlan_aware_bundles:
  - name: default
    rd: 172.16.30.35:10
    route_targets:
      both:
      - '10:10'
    redistribute_routes:
    - learned
    vlan: 10,20,30,40
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
    - name: WAN
      activate: true
  vrfs:
  - name: default
    rd: 172.16.30.35:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
        - route-map RM-EVPN-EXPORT-VRF-DEFAULT
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 16384
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: MGMT
