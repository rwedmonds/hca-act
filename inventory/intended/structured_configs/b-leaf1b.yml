aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet11
  description: MLAG_b-leaf1a_Ethernet11
  shutdown: false
  channel_group:
    id: 11
    mode: active
  metadata:
    peer: b-leaf1a
    peer_interface: Ethernet11
    peer_type: mlag_peer
- name: Ethernet12
  description: MLAG_b-leaf1a_Ethernet12
  shutdown: false
  channel_group:
    id: 11
    mode: active
  metadata:
    peer: b-leaf1a
    peer_interface: Ethernet12
    peer_type: mlag_peer
- name: Ethernet1
  description: P2P_b-spine1_Ethernet6
  shutdown: false
  mtu: 1500
  ip_address: 172.16.0.93/31
  metadata:
    peer: b-spine1
    peer_interface: Ethernet6
    peer_type: spine
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_b-spine2_Ethernet6
  shutdown: false
  mtu: 1500
  ip_address: 172.16.0.95/31
  metadata:
    peer: b-spine2
    peer_interface: Ethernet6
    peer_type: spine
  switchport:
    enabled: false
hostname: b-leaf1b
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:dc:01
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 172.16.20.24/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 172.16.21.23/32
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 192.168.0.44/24
  type: oob
  gateway: 192.168.0.1
metadata:
  is_deployed: true
  platform: vEOS-LAB
  dc_name: CAMPUS_B
  fabric_name: HCA
  cv_tags:
    device_tags:
    - name: MLAG
      value: even
mlag_configuration:
  domain_id: b-leaf1
  local_interface: Vlan4094
  peer_address: 10.255.255.44
  peer_address_heartbeat:
    peer_ip: 192.168.0.43
    vrf: MGMT
  dual_primary_detection_delay: 5
  peer_link: Port-Channel11
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
port_channel_interfaces:
- name: Port-Channel11
  description: MLAG_b-leaf1a_Port-Channel11
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 2-4094
      groups:
      - MLAG
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 172.16.20.0/24 eq 32
  - sequence: 20
    action: permit 172.16.21.0/24 eq 32
- name: PL-SVI-VRF-DEFAULT
  sequence_numbers:
  - sequence: 10
    action: permit 10.20.30.0/24
  - sequence: 20
    action: permit 10.20.20.0/24
  - sequence: 30
    action: permit 10.20.10.0/24
  - sequence: 40
    action: permit 10.20.40.0/24
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
  - sequence: 30
    type: permit
    match:
    - ip address prefix-list PL-SVI-VRF-DEFAULT
- name: RM-BGP-UNDERLAY-PEERS-OUT
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-SVI-VRF-DEFAULT
  - sequence: 20
    type: permit
- name: RM-EVPN-EXPORT-VRF-DEFAULT
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-SVI-VRF-DEFAULT
router_bfd:
  multihop:
    interval: 1200
    min_rx: 1200
    multiplier: 3
router_bgp:
  as: '65201'
  router_id: 172.16.20.24
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65201'
    description: b-leaf1a
    next_hop_self: true
    password: vnEaG8gMeQf3d3cN6PktXQ==
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    password: AQQvKeimxJu+uGQ/yYvv9w==
    send_community: all
    maximum_routes: 256000
    route_map_out: RM-BGP-UNDERLAY-PEERS-OUT
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    password: q+VNViP5i4rVjW1cxFv2wA==
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.254.44
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: b-leaf1a
    description: b-leaf1a_Vlan4093
  - ip_address: 172.16.0.92
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: b-spine1
    description: b-spine1_Ethernet6
  - ip_address: 172.16.0.94
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: b-spine2
    description: b-spine2_Ethernet6
  - ip_address: 192.168.234.21
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: b-spine1
    description: b-spine1_Loopback0
  - ip_address: 192.168.234.22
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: b-spine2
    description: b-spine2_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlan_aware_bundles:
  - name: default
    rd: 172.16.20.24:10
    route_targets:
      both:
      - '10:10'
    redistribute_routes:
    - learned
    vlan: 10,20,30,40
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: default
    rd: 172.16.20.24:10
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '10:10'
      export:
      - address_family: evpn
        route_targets:
        - '10:10'
        - route-map RM-EVPN-EXPORT-VRF-DEFAULT
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 16384
  no_spanning_tree_vlan: 4093-4094
static_routes:
- vrf: MGMT
  prefix: 0.0.0.0/0
  next_hop: 192.168.0.1
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 10.255.254.45/31
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 10.255.255.45/31
  mtu: 1500
  no_autostate: true
- name: Vlan10
  description: MGMT
  shutdown: false
  ip_address_virtual: 10.20.10.1/24
  metadata:
    tenants:
    - HCA
- name: Vlan20
  description: USER
  shutdown: false
  ip_address_virtual: 10.20.20.1/24
  metadata:
    tenants:
    - HCA
- name: Vlan30
  description: VOICE
  shutdown: false
  ip_address_virtual: 10.20.30.1/24
  metadata:
    tenants:
    - HCA
- name: Vlan40
  description: PACS
  shutdown: false
  ip_address_virtual: 10.20.40.1/24
  metadata:
    tenants:
    - HCA
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 10
  name: MGMT
  metadata:
    tenants:
    - HCA
- id: 20
  name: USER
  metadata:
    tenants:
    - HCA
- id: 30
  name: VOICE
  metadata:
    tenants:
    - HCA
- id: 40
  name: PACS
  metadata:
    tenants:
    - HCA
vrfs:
- name: MGMT
  ip_routing: false
vxlan_interface:
  vxlan1:
    description: b-leaf1b_VTEP
    vxlan:
      source_interface: Loopback1
      udp_port: 4789
      virtual_router_encapsulation_mac_address: mlag-system-id
      vlans:
      - id: 10
        vni: 10010
      - id: 20
        vni: 10020
      - id: 30
        vni: 10030
      - id: 40
        vni: 10040
      vrfs:
      - name: default
        vni: 10
