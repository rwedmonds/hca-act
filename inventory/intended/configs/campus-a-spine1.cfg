!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname campus-a-spine1
!
spanning-tree mode none
!
vrf instance MGMT
!
interface Ethernet5
   description P2P_campus-a-leaf1a_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.0.48/31
!
interface Ethernet6
   description P2P_campus-a-leaf1b_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.0.52/31
!
interface Ethernet7
   description P2P_campus-a-leaf2a_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.0.56/31
!
interface Ethernet8
   description P2P_campus-a-leaf2b_Ethernet1
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.0.60/31
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 192.168.244.11/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 192.168.0.31/24
!
ip routing
no ip routing vrf MGMT
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 192.168.244.0/24 eq 32
!
ip route vrf MGMT 0.0.0.0/0 192.168.0.1
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
router bfd
   multihop interval 1200 min-rx 1200 multiplier 3
!
router bgp 65100
   router-id 192.168.244.11
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS next-hop-unchanged
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS password 7 q+VNViP5i4rVjW1cxFv2wA==
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS password 7 AQQvKeimxJu+uGQ/yYvv9w==
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor 172.16.0.49 peer group IPv4-UNDERLAY-PEERS
   neighbor 172.16.0.49 remote-as 65101
   neighbor 172.16.0.49 description campus-a-leaf1a_Ethernet1
   neighbor 172.16.0.53 peer group IPv4-UNDERLAY-PEERS
   neighbor 172.16.0.53 remote-as 65101
   neighbor 172.16.0.53 description campus-a-leaf1b_Ethernet1
   neighbor 172.16.0.57 peer group IPv4-UNDERLAY-PEERS
   neighbor 172.16.0.57 remote-as 65102
   neighbor 172.16.0.57 description campus-a-leaf2a_Ethernet1
   neighbor 172.16.0.61 peer group IPv4-UNDERLAY-PEERS
   neighbor 172.16.0.61 remote-as 65102
   neighbor 172.16.0.61 description campus-a-leaf2b_Ethernet1
   neighbor 172.16.10.13 peer group EVPN-OVERLAY-PEERS
   neighbor 172.16.10.13 remote-as 65101
   neighbor 172.16.10.13 description campus-a-leaf1a_Loopback0
   neighbor 172.16.10.14 peer group EVPN-OVERLAY-PEERS
   neighbor 172.16.10.14 remote-as 65101
   neighbor 172.16.10.14 description campus-a-leaf1b_Loopback0
   neighbor 172.16.10.15 peer group EVPN-OVERLAY-PEERS
   neighbor 172.16.10.15 remote-as 65102
   neighbor 172.16.10.15 description campus-a-leaf2a_Loopback0
   neighbor 172.16.10.16 peer group EVPN-OVERLAY-PEERS
   neighbor 172.16.10.16 remote-as 65102
   neighbor 172.16.10.16 description campus-a-leaf2b_Loopback0
   redistribute connected route-map RM-CONN-2-BGP
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
!
end
