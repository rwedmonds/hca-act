!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname b-leaf2c
!
vlan 10
   name MGMT
!
vlan 20
   name USER
!
vlan 30
   name VOICE
!
vlan 40
   name PACS
!
vrf instance MGMT
!
interface Port-Channel1
   description L2_b-leaf2_Port-Channel5
   no shutdown
   switchport trunk allowed vlan 10,20,30,40
   switchport mode trunk
   switchport
!
interface Port-Channel5
   description SERVER_b-leaf2-server1
   no shutdown
   switchport access vlan 110
   switchport mode access
   switchport
!
interface Ethernet1
   description L2_b-leaf2a_Ethernet5
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_b-leaf2b_Ethernet5
   no shutdown
   channel-group 1 mode active
!
interface Ethernet5
   description SERVER_b-leaf2-server1_Ethernet1
   no shutdown
   channel-group 5 mode active
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   vrf MGMT
   ip address 192.168.0.47/24
no ip routing vrf MGMT
!
ip route vrf MGMT 0.0.0.0/0 192.168.0.1
!
end
